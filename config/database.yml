default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  url: postgresql://postgres:admin@127.0.0.1:5432/store_api_development

test:
  url: postgresql://postgres:admin@127.0.0.1:5432/store_api_test

production:
  primary: &primary_production
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate